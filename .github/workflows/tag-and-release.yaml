name: Tag and Release on manifest.json version change

on:
  push:
    paths:
      - 'custom_components/octopus_germany/manifest.json'

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from manifest.json
        run: |
          VERSION=$(jq -r '.version' custom_components/octopus_germany/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Check if tag exists
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create tag and push
        if: env.EXISTS == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Generate release notes
        if: env.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${{ github.sha }}" \
            --jq '.body' > generated_notes.md

      - name: Extract version section from RELEASE_NOTES.md
        if: env.EXISTS == 'false'
        run: |
          HEADER="## Version ${VERSION}"

          awk -v header="$HEADER" '
            $0 == header { found=1; print; next }
            found && /^## Version / { exit }
            found { print }
          ' RELEASE_NOTES.md > curated_notes.md

          if [ -s curated_notes.md ]; then
            echo "HAS_CURATED_NOTES=true" >> $GITHUB_ENV
          else
            echo "HAS_CURATED_NOTES=false" >> $GITHUB_ENV
          fi

      - name: Read minimum Home Assistant version
        if: env.EXISTS == 'false'
        run: |
          MIN_HA_VERSION=$(jq -r '.homeassistant' hacs.json)
          echo "MIN_HA_VERSION=$MIN_HA_VERSION" >> $GITHUB_ENV

      - name: Build final release notes
        if: env.EXISTS == 'false'
        run: |
          if [ "${HAS_CURATED_NOTES}" = "true" ]; then
            cat curated_notes.md > release_body.md
            printf "\n---\n\n### Auto-generated changes\n\n" >> release_body.md
            cat generated_notes.md >> release_body.md
          else
            cat generated_notes.md > release_body.md
          fi

          printf "\n\n**Minimum HA Version**: %s\n" "${MIN_HA_VERSION}" >> release_body.md
          printf "\n\n---\n\n## 💚 Support the Project\n\nIf you find this project valuable and would like to support its continued development, you can do so here:\nhttps://ko-fi.com/K3K71LPRM2\n\n## ⚡ New to Octopus Energy Germany?\n\nIf you are new to Octopus Energy Germany, you can use the following referral link to receive a **€100 bonus** upon sign-up:\nhttps://octopusenergy.de/empfehlungen?referralCode=free-cat-744\n\n## 🙏 Thank You\n\nThank you for your support, contributions, and feedback — it helps make this integration better for everyone.\n" >> release_body.md

      - name: Create GitHub Release
        if: env.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_body.md
          prerelease: ${{ env.PRERELEASE }}
